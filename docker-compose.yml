services:
  caddy: 
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network
    depends_on:
      - web
  web:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src:/usr/share/nginx/src:ro
      - ./dist:/usr/share/nginx/dist:ro
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 50m

  server:
    build: .
    container_name: server
    expose:
      - "5000"
    volumes:
      - ./components:/app/components
      - ./fotoPerfil:/app/fotoPerfil
      - ./media:/app/media
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FILE_COMPONENTS: ${FILE_COMPONENTS}
      FILE_PATH: ${FILE_PATH}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
    command: uvicorn asgi:app --host 0.0.0.0 --port 5000
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - app-network
    mem_limit: 150m

  db:
    image: mariadb:10
    container_name: db
    restart: always
    command: --innodb-buffer-pool-size=512M --max-connections=200 --event-scheduler=ON
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_PORT: 3306
    networks:
      - app-network
    mem_limit: 100m

  mongo:
    image: mongo
    container_name: ${MONGO_NAME:-mongo}
    restart: unless-stopped
    volumes:
      - ./data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network
    mem_limit: 300m
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 100m

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
  

