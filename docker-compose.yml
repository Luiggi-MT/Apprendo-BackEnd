version: "3.9"

services:
  caddy: 
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network
    depends_on:
      - web
  web:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - app-network
    mem_limit: 50m

  server:
    build: .
    container_name: server
    expose:
      - "5000"
    volumes:
      - ./components:/app/components
      - ./fotoPerfil:/app/fotoPerfil
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FILE_COMPONENTS: ${FILE_COMPONENTS}
      FILE_PATH: ${FILE_PATH}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    command: python app.py
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 150m

  db:
    image: mariadb:10
    container_name: db
    restart: always
    command: --innodb-buffer-pool-size=512M --max-connections=200
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_PORT: 3306
    networks:
      - app-network
    mem_limit: 100m

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
  

