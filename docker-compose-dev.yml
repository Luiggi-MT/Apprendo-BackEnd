version: "3.9"

services:
  db:
    image: mariadb:10
    container_name: ${DB_NAME}
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"  # Usa el puerto definido en tu .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_TCP_PORT: 3306
    volumes:
      - db_data:/var/lib/mysql
    command: 
      - --bind-address=0.0.0.0
      - --skip-name-resolve
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # Usamos las variables para que el ping funcione incluso si cambias la clave
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - db-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 300m

  phpmyadmin:
    image: phpmyadmin
    container_name: cole_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db-network
    mem_limit: 100m

networks:
  db-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  db_data:
    name: ${DB_NAME}_data  # Nombre dinámico basado en tu DB_NAME